<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battabilité des Pieux Métalliques — Port Nador West Med</title>
    <style>
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px;}
.container{max-width:1200px;margin:0 auto;background:white;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.3);overflow:hidden;}
header{background:linear-gradient(135deg,#1e3c72 0%,#2a5298 100%);color:white;padding:30px;text-align:center;}
header h1{font-size:2em;margin-bottom:10px;}
header p{opacity:.9;font-size:1.1em;}
.tabs{display:flex;background:#f8f9fa;border-bottom:2px solid #dee2e6;}
.tab{flex:1;padding:15px;background:none;border:none;cursor:pointer;font-size:1em;font-weight:600;color:#6c757d;}
.tab.active{background:white;color:#2a5298;border-bottom:3px solid #2a5298;}
.content{padding:30px;}
.section{display:none;}
.section.active{display:block;}
.btn{padding:12px 30px;border:none;border-radius:6px;font-weight:600;cursor:pointer;}
.btn-primary{background:#2a5298;color:white;}
.btn-success{background:#28a745;color:white;}
footer{background:#f8f9fa;padding:20px;text-align:center;color:#6c757d;border-top:2px solid #dee2e6;}

    </style>
</head>
<body>
<div class="container">
<header>
<h1>🏗️ Battabilité des Pieux Métalliques</h1>
<p>Application PFE - Port Nador West Med</p>
</header>

<div class="tabs">
<button class="tab active" onclick="showTab('home')">Accueil</button>
<button class="tab" onclick="showTab('calc')">Calcul</button>
</div>

<div class="content">
<div id="home" class="section active">
<h2>Bienvenue</h2>
<p>Application de calcul de battabilité des pieux métalliques.</p>
<button class="btn btn-success" onclick="showTab('calc')">Commencer →</button>
</div>

<div id="calc" class="section">
<h2>Calcul simple</h2>
<label>Charge (kN)</label>
<input type="number" id="charge" value="1000">
<br><br>
<button class="btn btn-primary" onclick="calcul()">Calculer</button>
<div id="result"></div>
</div>
</div>

<footer>
<p>Projet de Fin d'Études - Génie Civil</p>
</footer>
</div>

<script>
function showTab(tab){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.getElementById(tab).classList.add('active');
event.target.classList.add('active');
}

function calcul(){
let Q = document.getElementById('charge').value;
document.getElementById('result').innerHTML = "<h3>Résultat : "+Q+" kN</h3>";
}
</script>

</body>
</html>
